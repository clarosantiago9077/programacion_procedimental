<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Pedido</title>
  <link rel="stylesheet" href="../css/inventario.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>

<section class="section">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-half">

        <div class="box">
          <h2 class="title has-text-centered">Formulario de Pedido</h2>

          <form>

            
            <div class="field">
              <label class="label">Nombre del Usuario</label>
              <div class="control">
                <input class="input" type="text" placeholder="Ingrese su nombre" required>
              </div>
            </div>

            
            <div class="field">
              <label class="label">Producto</label>
              <div class="control">
                <input class="input" type="text" placeholder="Ingrese el producto" required>
              </div>
            </div>

            
            <div class="field">
              <label class="label">Cantidad</label>
              <div class="control">
                <input class="input" type="number" placeholder="Ingrese la cantidad" required>
              </div>
            </div>

            
            <div class="field">
              <label class="label">Dirección</label>
              <div class="control">
                <input class="input" type="text" placeholder="Ingrese la dirección" required>
              </div>
            </div>

            
            <div class="field">
              <label class="label">Teléfono</label>
              <div class="control">
                <input class="input" type="tel" placeholder="Ingrese su teléfono" required>
              </div>
            </div>

            
            <div class="field">
              <label class="label">Método de Pago</label>
              <div class="control">
                <div class="select is-fullwidth">
                  <select required>
                    <option value="">Seleccione</option>
                    <option>Efectivo</option>
                    <option>Tarjeta de Crédito</option>
                    <option>Tarjeta Débito</option>
                    <option>Transferencia</option>
                  </select>
                </div>
              </div>
            </div>

            
            <div class="field">
              <div class="control">
                <button class="button is-primary is-fullwidth" type="submit">
                  Realizar Pedido
                </button>
              </div>
            </div>

            
            <div class="field">
              <div class="control">
                <a href="../index.html"><button class="button is-light is-fullwidth" type="button">Volver al inicio</button></a>
              </div>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</section>

</body>
</html>
