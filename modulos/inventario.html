<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Inventario</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a0c063, #9ac474);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .contenedor {
      background: #53754e;
      width: 450px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #69ad97;
    }

    .grupo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #5dad6a;
      outline: none;
      box-shadow: 0 0 5px rgba(42, 82, 152, 0.5);
    }

    textarea {
      resize: none;
      height: 90px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16325c;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <h2> Inventario</h2>

    <form>

      <div class="grupo">
        <label for="codigo">Codigo Producto</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>

      <div class="grupo">
        <label for="nombre">Nombre Producto</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="grupo">
        <label for="cantidad">Cantidad Producto</label>
        <input type="number" id="cantidad" name="cantidad" required>
      </div>

      <div class="grupo">
        <label for="descripcion">Descripcion Producto</label>
        <textarea id="descripcion" name="descripcion"></textarea>
      </div>

      <div class="grupo">
        <label for="marca">Marca Producto</label>
        <input type="text" id="marca" name="marca" required>
      </div>

      <div class="grupo">
        <label for="valor">Valor Unitario</label>
        <input type="number" id="valor" name="valor" required>
      </div>

      <div class="grupo">
        <label for="categoria">Categoria Productos</label>
        <select id="categoria" name="categoria" required>
          <option value="">Seleccione una categoria</option>
          <option>Tecnologia</option>
          <option>Oficina</option>
          <option>Hogar</option>
          <option>Ropa</option>
          <option>Otros</option>
        </select>
      </div>

      <div class="grupo">
        <label for="ubicacion">Ubicacion Producto</label>
        <input type="text" id="ubicacion" name="ubicacion" required>
      </div>

      <button type="submit">Guardar Producto</button>


    <a href="../index.html"><button type="button">Volver al inicio</button></a>


    </form>

  </div>

</body>

</html>
