<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Inventario</title>
   <link rel="stylesheet" href="../css/inventario.css">
  <style>
    
  </style>
</head>

<body>

  <div class="contenedor">

    <h2> Inventario</h2>

    <form>

      <div class="grupo">
        <label for="codigo">Codigo Producto</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>

      <div class="grupo">
        <label for="nombre">Nombre Producto</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="grupo">
        <label for="cantidad">Cantidad Producto</label>
        <input type="number" id="cantidad" name="cantidad" required>
      </div>

      <div class="grupo">
        <label for="descripcion">Descripcion Producto</label>
        <textarea id="descripcion" name="descripcion"></textarea>
      </div>

      <div class="grupo">
        <label for="marca">Marca Producto</label>
        <input type="text" id="marca" name="marca" required>
      </div>

      <div class="grupo">
        <label for="valor">Valor Unitario</label>
        <input type="number" id="valor" name="valor" required>
      </div>

      <div class="grupo">
        <label for="categoria">Categoria Productos</label>
        <select id="categoria" name="categoria" required>
          <option value="">Seleccione una categoria</option>
          <option>Tecnologia</option>
          <option>Oficina</option>
          <option>Hogar</option>
          <option>Ropa</option>
          <option>Otros</option>
        </select>
      </div>

      <div class="grupo">
        <label for="ubicacion">Ubicacion Producto</label>
        <input type="text" id="ubicacion" name="ubicacion" required>
      </div>

      <button type="submit">Guardar Producto</button>


    <a href="../index.html"><button type="button">Volver al inicio</button></a>


    </form>

  </div>

</body>

</html>
